services:
  flask:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - 5001:5001
    image: api:v1
    container_name: api
  
  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    ports: 
      - 1883:1883
    image: broker:v1
    container_name: broker
  
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    ports:
      - 5432:5432
    image: database:v1
    volumes:
      - db_data:/var/lib/postgresql/18/docker
    container_name: postgres
  
  ingestor:
      build:
        context: ./ingestor
        dockerfile: Dockerfile
      container_name: ingestor
      image: ingestor:v1
      depends_on:
        - broker
        - database

volumes:
  db_data: