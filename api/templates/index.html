<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Pomiarowy IoT</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .welcome-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }

        p { color: #666; margin-bottom: 30px; }
        .btn-enter { background: #007BFF; color: white; text-decoration: none; padding: 15px 30px; font-size: 16px; border-radius: 8px; font-weight: bold; transition: background 0.2s; display: inline-block; }
        .btn-enter:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>Panel IoT</h1>
        <p>Witaj w systemie rozproszonych pomiarów laboratoryjnych.</p>
        <a href="/dashboard" class="btn-enter">Otwórz Wykresy Live</a>
    </div>

</body>
</html>
